{% extends 'base.html' %}
{% block content %}
<div class="container py-5 text-center">
    <div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 400px;">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
        <h4 class="mt-3">O'chirishni tasdiqlaysizmi?</h4>
        <p class="text-muted">"{{ group.name }}" guruhini o'chirishni xohlaysizmi?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">Ha, o'chirilsin</button>
            <a href="{% url 'group_list' %}" class="btn btn-light px-4">Bekor qilish</a>
        </form>
    </div>
</div>
{% endblock %}
