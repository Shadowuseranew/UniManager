{% extends base_template %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 text-center">
            <div class="card-body p-5">
                <i class="bi bi-exclamation-circle text-danger display-4 mb-3"></i>
                <h4 class="fw-bold">Materialni o'chirasizmi?</h4>
                <p class="text-muted mb-1">«{{ material.title }}»</p>
                <small class="text-muted d-block mb-4">{{ material.subject.name }} faniga tegishli</small>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4 me-2">Ha, o'chirilsin</button>
                    <a href="{% url 'material_list' %}" class="btn btn-outline-secondary px-4">Bekor qilish</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
