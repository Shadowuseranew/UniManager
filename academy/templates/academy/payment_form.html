{% extends base_template %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white"><h5 class="mb-0">Yangi to'lov</h5></div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success w-100">Saqlash</button>
                    <a href="{% url 'payment_list' %}" class="btn btn-outline-secondary w-100 mt-2">Bekor qilish</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
