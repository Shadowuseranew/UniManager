{% extends base_template %}
{% block content %}
<div class="container-fluid py-4">
    <h3 class="fw-bold text-dark mb-4"><i class="bi bi-calendar2-plus me-2 text-success"></i> Yangi semestr qo'shish</h3>
    <div class="card border-0 shadow-sm rounded-4 p-4" style="max-width:600px;">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label fw-semibold">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
                {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
            </div>
            {% endfor %}
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-success px-4"><i class="bi bi-check-lg me-1"></i> Saqlash</button>
                <a href="{% url 'semester_list' %}" class="btn btn-outline-secondary px-4">Bekor qilish</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
