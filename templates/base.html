<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniManager | {% block title %}Boshqaruv Paneli{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6C5CE7;
            --primary-dark: #5A4BD1;
            --primary-light: #A29BFE;
            --secondary: #00CEC9;
            --secondary-dark: #00B5B0;
            --accent: #FD79A8;
            --accent-dark: #E84393;
            --warning: #FDCB6E;
            --danger: #FF6B6B;
            --success: #00B894;
            --info: #74B9FF;
            --bg: #f0f2f5;
            --bg-dark: #e8ecf1;
            --sidebar-bg: #1a1a2e;
            --sidebar-hover: #16213e;
            --sidebar-active: #0f3460;
            --card-bg: rgba(255,255,255,0.92);
            --card-shadow: 0 8px 32px rgba(0,0,0,0.08);
            --card-shadow-hover: 0 12px 40px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: #2d3436;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }

        /* ===== SIDEBAR ===== */
        #sidebar {
            min-width: 260px;
            max-width: 260px;
            min-height: 100vh;
            background: var(--sidebar-bg);
            color: white;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1020;
        }
        #sidebar .logo-section {
            background: linear-gradient(135deg, var(--primary), #8B74FF, var(--secondary));
            padding: 28px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        #sidebar .logo-section::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -40%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        #sidebar .logo-section::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }
        #sidebar .logo-section h4 { position: relative; z-index: 1; letter-spacing: -0.5px; }
        #sidebar .logo-section small { position: relative; z-index: 1; }
        #sidebar .nav-link {
            color: #a0a0b8;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            transition: var(--transition);
            border-radius: 0 12px 12px 0;
            margin: 2px 12px 2px 0;
            font-weight: 500;
            font-size: 0.88rem;
            position: relative;
        }
        #sidebar .nav-link:hover {
            background: var(--sidebar-hover);
            color: white;
            transform: translateX(4px);
        }
        #sidebar .nav-link.active {
            background: linear-gradient(135deg, var(--primary), #8B74FF);
            color: white !important;
            box-shadow: 0 4px 15px rgba(108,92,231,0.4);
        }
        #sidebar .nav-link.active::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 20px;
            background: var(--secondary);
            border-radius: 0 4px 4px 0;
        }
        #sidebar .nav-link i { font-size: 1.15rem; margin-right: 12px; width: 20px; text-align: center; }
        #sidebar .nav-link[data-bs-toggle="collapse"] .bi-chevron-down { transition: transform 0.3s; margin-left: auto; }
        #sidebar .nav-link[data-bs-toggle="collapse"]:not(.collapsed) .bi-chevron-down { transform: rotate(180deg); }
        #sidebar .collapse .nav-link { padding: 8px 15px 8px 48px; font-size: 0.85rem; margin: 1px 12px 1px 0; }
        #sidebar .menu-label { font-size: 0.62rem; letter-spacing: 1.8px; color: #555; text-transform: uppercase; padding: 0 20px; }

        /* ===== MAIN ===== */
        .main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .top-navbar {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 30px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1010;
        }
        .content-container { padding: 30px; flex: 1; }
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: var(--card-shadow);
            padding: 28px;
            transition: var(--transition);
        }
        .main-card:hover { box-shadow: var(--card-shadow-hover); }

        .user-profile-img {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(108,92,231,0.3);
            transition: var(--transition);
        }
        .user-profile-img:hover { transform: scale(1.05); }

        #sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1040;
        }
        #sidebar-overlay.show { display: block; }
        #sidebarToggle { display: none; cursor: pointer; }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .main-card { animation: fadeInUp 0.5s ease; }
        .stat-card { animation: fadeInUp 0.5s ease both; }
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        .stat-card:nth-child(5) { animation-delay: 0.25s; }
        .stat-card:nth-child(6) { animation-delay: 0.3s; }

        /* ===== STAT CARDS ===== */
        .stat-card {
            border-radius: var(--radius);
            padding: 22px 24px;
            color: white;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            border: none;
            cursor: default;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        .stat-card .stat-icon {
            font-size: 2rem;
            opacity: 0.3;
            position: absolute;
            top: 12px;
            right: 16px;
        }
        .stat-card .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }
        .stat-card .stat-label {
            font-size: 0.82rem;
            opacity: 0.85;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        .stat-card .stat-trend {
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* ===== BUTTONS ===== */
        .btn {
            border-radius: var(--radius-sm);
            font-weight: 600;
            padding: 10px 20px;
            transition: var(--transition);
            font-size: 0.88rem;
        }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: var(--radius-xs); }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            box-shadow: 0 4px 15px rgba(108,92,231,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108,92,231,0.4);
            background: linear-gradient(135deg, var(--primary-dark), #4A3DB8);
        }
        .btn-success {
            background: linear-gradient(135deg, var(--success), #00A383);
            border: none;
            box-shadow: 0 4px 15px rgba(0,184,148,0.3);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,184,148,0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #E05555);
            border: none;
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,107,0.4);
        }
        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #F0C050);
            border: none;
            color: #2d3436;
        }
        .btn-info {
            background: linear-gradient(135deg, var(--info), #5BA3E8);
            border: none;
            color: white;
        }
        .btn-outline-primary {
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline-primary:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }
        .btn-outline-secondary {
            border: 2px solid #dee2e6;
            color: #6c757d;
        }
        .btn-outline-secondary:hover {
            background: #f8f9fa;
            border-color: #adb5bd;
            transform: translateY(-2px);
        }
        .btn-outline-danger {
            border: 2px solid rgba(220,53,69,0.3);
            color: #dc3545;
        }
        .btn-outline-danger:hover {
            background: linear-gradient(135deg, var(--danger), #E05555);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(220,53,69,0.3);
        }

        /* ===== TABLE ===== */
        .table {
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: 0;
        }
        .table thead th {
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c757d;
            padding: 14px 12px;
        }
        .table tbody td { padding: 12px; vertical-align: middle; }
        .table tbody tr {
            transition: var(--transition);
        }
        .table tbody tr:hover {
            background: rgba(108,92,231,0.03) !important;
        }
        .table-hover tbody tr:hover {
            background: rgba(108,92,231,0.04);
        }

        /* ===== FORMS ===== */
        .form-control, .form-select {
            border-radius: var(--radius-sm);
            border: 1.5px solid #e9ecef;
            padding: 11px 14px;
            transition: var(--transition);
            font-size: 0.9rem;
            background: #fafbfc;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108,92,231,0.1);
            background: white;
        }
        .form-label { font-weight: 600; font-size: 0.85rem; color: #4a4a5a; margin-bottom: 6px; }
        .form-text { font-size: 0.78rem; color: #6c757d; }

        /* ===== CARDS ===== */
        .card {
            border-radius: var(--radius);
            border: 1px solid rgba(0,0,0,0.04);
            transition: var(--transition);
        }
        .card-header {
            background: white;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            padding: 18px 24px;
        }

        /* ===== BADGES ===== */
        .badge {
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
        }
        .badge.bg-info-subtle { background: rgba(116,185,255,0.15); color: #2980b9; }
        .badge.bg-warning-subtle { background: rgba(253,203,110,0.2); color: #b7950b; }
        .badge.bg-danger-subtle { background: rgba(255,107,107,0.15); color: #c0392b; }
        .badge.bg-success-subtle { background: rgba(0,184,148,0.15); color: #008060; }

        /* ===== ALERTS ===== */
        .alert {
            border-radius: var(--radius-sm);
            border: none;
            animation: slideInLeft 0.3s ease;
            padding: 14px 18px;
        }
        .alert-success { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: #155724; }
        .alert-danger { background: linear-gradient(135deg, #f8d7da, #f5c6cb); color: #721c24; }
        .alert-warning { background: linear-gradient(135deg, #fff3cd, #ffeaa7); color: #856404; }
        .alert-info { background: linear-gradient(135deg, #d1ecf1, #bee5eb); color: #0c5460; }

        /* ===== PAGINATION ===== */
        .pagination { gap: 4px; }
        .page-link {
            border-radius: var(--radius-xs) !important;
            border: none;
            padding: 8px 14px;
            font-weight: 500;
            color: var(--primary);
            transition: var(--transition);
        }
        .page-link:hover { background: var(--primary); color: white; }
        .page-item.active .page-link { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; }

        /* ===== NAV TABS ===== */
        .nav-tabs { border-bottom: 2px solid #e9ecef; gap: 4px; }
        .nav-tabs .nav-link {
            border: none;
            color: #6c757d;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            transition: var(--transition);
        }
        .nav-tabs .nav-link:hover { background: rgba(108,92,231,0.05); color: var(--primary); }
        .nav-tabs .nav-link.active {
            color: var(--primary);
            background: transparent;
            border-bottom: 3px solid var(--primary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 991.98px) {
            .stat-card .stat-number { font-size: 1.5rem; }
            .content-container { padding: 20px; }
        }
        @media (max-width: 767.98px) {
            #sidebar { position: fixed; top: 0; left: -260px; z-index: 1050; transition: left 0.3s; box-shadow: none; }
            #sidebar.open { left: 0; box-shadow: 4px 0 30px rgba(0,0,0,0.3); }
            #sidebarToggle { display: block; }
            .top-navbar { padding: 10px 15px; }
            .top-navbar h5 { font-size: 0.95rem; }
            .content-container { padding: 15px; }
            .main-card { padding: 16px; border-radius: 12px; }
            .stat-card { padding: 16px 18px; }
            .stat-card .stat-number { font-size: 1.3rem; }
            .table { font-size: 0.82rem; }
            .table thead th, .table tbody td { padding: 8px 6px; }
            .btn { padding: 8px 14px; font-size: 0.82rem; }
            .nav-tabs .nav-link { padding: 8px 12px; font-size: 0.82rem; }
        }

        /* ===== UTILITY ===== */
        .gradient-primary { background: linear-gradient(135deg, var(--primary), #8B74FF); }
        .gradient-secondary { background: linear-gradient(135deg, var(--secondary), #00E5D0); }
        .gradient-accent { background: linear-gradient(135deg, var(--accent), #E84393); }
        .gradient-warning { background: linear-gradient(135deg, #FDCB6E, #E17055); }
        .gradient-success { background: linear-gradient(135deg, var(--success), #55EFC4); }
        .gradient-info { background: linear-gradient(135deg, var(--info), #6C5CE7); }
        .gradient-danger { background: linear-gradient(135deg, var(--danger), #E05555); }
        .gradient-dark { background: linear-gradient(135deg, #2d3436, #636e72); }

        .text-gradient {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .glass-dark {
            background: rgba(26,26,46,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .empty-state { padding: 60px 20px; text-align: center; }
        .empty-state i { font-size: 4rem; color: #ddd; margin-bottom: 16px; }
        .empty-state h5 { color: #6c757d; font-weight: 600; }

        .clickable-row { cursor: pointer; }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        footer { margin-top: auto; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}
    {% block content %}{% endblock %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Sidebar toggle
            const toggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (toggle && sidebar && overlay) {
                toggle.addEventListener('click', function() {
                    sidebar.classList.toggle('open');
                    overlay.classList.toggle('show');
                });
                overlay.addEventListener('click', function() {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('show');
                });
            }

            // Auto-hide alerts after 5 seconds
            document.querySelectorAll('.alert-dismissible').forEach(function(alert) {
                setTimeout(function() {
                    var bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }, 5000);
            });

            // Table row click with keyboard support
            document.querySelectorAll('.clickable-row').forEach(function(row) {
                row.setAttribute('tabindex', '0');
                row.setAttribute('role', 'button');
                row.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        var href = this.dataset.href;
                        if (href) window.location = href;
                    }
                });
            });

            // Enable tooltips everywhere
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function(el) {
                return new bootstrap.Tooltip(el);
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
