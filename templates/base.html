<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniManager | {% block title %}Boshqaruv Paneli{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6C5CE7;
            --primary-dark: #5A4BD1;
            --primary-light: #A29BFE;
            --secondary: #00CEC9;
            --secondary-dark: #00B5B0;
            --accent: #FD79A8;
            --accent-dark: #E84393;
            --warning: #FDCB6E;
            --danger: #FF6B6B;
            --success: #00B894;
            --info: #74B9FF;
            --bg: #f0f2f5;
            --bg-dark: #e8ecf1;
            --sidebar-bg: #1a1a2e;
            --sidebar-hover: #16213e;
            --sidebar-active: #0f3460;
            --card-bg: rgba(255,255,255,0.92);
            --card-shadow: 0 8px 32px rgba(0,0,0,0.08);
            --card-shadow-hover: 0 12px 40px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: #2d3436;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }

        /* Smooth scroll */
        html { scroll-behavior: smooth; }

        /* ===== SIDEBAR ===== */
        #sidebar {
            min-width: 260px;
            max-width: 260px;
            min-height: 100vh;
            background: var(--sidebar-bg);
            color: white;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1020;
        }
        #sidebar .logo-section {
            background: linear-gradient(135deg, var(--primary), #8B74FF, var(--secondary));
            padding: 28px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        #sidebar .logo-section::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -40%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        #sidebar .logo-section::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }
        #sidebar .logo-section h4 { position: relative; z-index: 1; letter-spacing: -0.5px; }
        #sidebar .logo-section small { position: relative; z-index: 1; }
        #sidebar .nav-link {
            color: #a0a0b8;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 0 12px 12px 0;
            margin: 2px 12px 2px 0;
            font-weight: 500;
            font-size: 0.88rem;
            position: relative;
            overflow: hidden;
        }
        #sidebar .nav-link::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        #sidebar .nav-link:hover::after {
            transform: translateX(100%);
        }
        #sidebar .nav-link:hover {
            background: var(--sidebar-hover);
            color: white;
            transform: translateX(4px);
        }
        #sidebar .nav-link.active {
            background: linear-gradient(135deg, var(--primary), #8B74FF);
            color: white !important;
            box-shadow: 0 4px 15px rgba(108,92,231,0.4);
        }
        #sidebar .nav-link.active::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 20px;
            background: var(--secondary);
            border-radius: 0 4px 4px 0;
        }
        #sidebar .nav-link i { font-size: 1.15rem; margin-right: 12px; width: 20px; text-align: center; }
        #sidebar .nav-link[data-bs-toggle="collapse"] .bi-chevron-down { transition: transform 0.3s; margin-left: auto; }
        #sidebar .nav-link[data-bs-toggle="collapse"]:not(.collapsed) .bi-chevron-down { transform: rotate(180deg); }
        #sidebar .collapse .nav-link { padding: 8px 15px 8px 48px; font-size: 0.85rem; margin: 1px 12px 1px 0; }
        #sidebar .menu-label { font-size: 0.62rem; letter-spacing: 1.8px; color: #555; text-transform: uppercase; padding: 0 20px; }

        /* ===== MAIN ===== */
        .main-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .top-navbar {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 30px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1010;
        }
        .content-container { padding: 30px; flex: 1; }
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: var(--card-shadow);
            padding: 28px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }
        .main-card:hover {
            box-shadow: var(--card-shadow-hover);
        }

        .user-profile-img {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(108,92,231,0.3);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }
        .user-profile-img:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 4px 15px rgba(108,92,231,0.4); }

        #sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1040;
            animation: fadeIn 0.2s ease;
        }
        #sidebar-overlay.show { display: block; }
        #sidebarToggle { display: none; cursor: pointer; }

        /* ===== PAGE TRANSITION ===== */
        #page-transition {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99998;
            display: none;
        }
        #page-transition.active {
            display: block;
        }
        #page-transition.exit {
            display: block;
        }
        #page-transition .layer {
            position: absolute;
            top: 0;
            height: 100%;
            background: var(--sidebar-bg);
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.18, 1);
        }
        #page-transition .layer:nth-child(1) { left: 0; width: 100%; }
        #page-transition .layer:nth-child(2) { left: 0; width: 100%; background: var(--primary); transition-delay: 0.05s; }
        #page-transition .layer:nth-child(3) { left: 0; width: 100%; background: var(--primary-dark); transition-delay: 0.1s; }
        #page-transition.active .layer {
            transform: translateX(0);
        }
        #page-transition.exit .layer:nth-child(1) { transform: translateX(100%); transition-delay: 0.15s; }
        #page-transition.exit .layer:nth-child(2) { transform: translateX(100%); transition-delay: 0.1s; }
        #page-transition.exit .layer:nth-child(3) { transform: translateX(100%); transition-delay: 0.05s; }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes flipIn {
            from { opacity: 0; transform: perspective(400px) rotateX(90deg); }
            to { opacity: 1; transform: perspective(400px) rotateX(0); }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes countUp {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .main-card {
            opacity: 0;
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .stat-card { animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both; }
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        .stat-card:nth-child(5) { animation-delay: 0.25s; }
        .stat-card:nth-child(6) { animation-delay: 0.3s; }
        .stat-card:nth-child(7) { animation-delay: 0.35s; }
        .stat-card:nth-child(8) { animation-delay: 0.4s; }

        /* Staggered table rows */
        .table tbody tr { animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1) both; }
        .table tbody tr:nth-child(1) { animation-delay: 0.03s; }
        .table tbody tr:nth-child(2) { animation-delay: 0.06s; }
        .table tbody tr:nth-child(3) { animation-delay: 0.09s; }
        .table tbody tr:nth-child(4) { animation-delay: 0.12s; }
        .table tbody tr:nth-child(5) { animation-delay: 0.15s; }
        .table tbody tr:nth-child(6) { animation-delay: 0.18s; }
        .table tbody tr:nth-child(7) { animation-delay: 0.21s; }
        .table tbody tr:nth-child(8) { animation-delay: 0.24s; }
        .table tbody tr:nth-child(9) { animation-delay: 0.27s; }
        .table tbody tr:nth-child(10) { animation-delay: 0.3s; }
        .table tbody tr:nth-child(11) { animation-delay: 0.33s; }
        .table tbody tr:nth-child(12) { animation-delay: 0.36s; }
        .table tbody tr:nth-child(13) { animation-delay: 0.39s; }
        .table tbody tr:nth-child(14) { animation-delay: 0.42s; }
        .table tbody tr:nth-child(15) { animation-delay: 0.45s; }

        /* Staggered cards in grid */
        .stagger-item { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) both; }
        .stagger-item:nth-child(1) { animation-delay: 0.04s; }
        .stagger-item:nth-child(2) { animation-delay: 0.08s; }
        .stagger-item:nth-child(3) { animation-delay: 0.12s; }
        .stagger-item:nth-child(4) { animation-delay: 0.16s; }
        .stagger-item:nth-child(5) { animation-delay: 0.2s; }
        .stagger-item:nth-child(6) { animation-delay: 0.24s; }
        .stagger-item:nth-child(7) { animation-delay: 0.28s; }
        .stagger-item:nth-child(8) { animation-delay: 0.32s; }

        /* Staggered form groups */
        .mb-3, .form-group { animation: fadeInUp 0.35s cubic-bezier(0.4, 0, 0.2, 1) both; }
        .mb-3:nth-child(1), .form-group:nth-child(1) { animation-delay: 0.02s; }
        .mb-3:nth-child(2), .form-group:nth-child(2) { animation-delay: 0.05s; }
        .mb-3:nth-child(3), .form-group:nth-child(3) { animation-delay: 0.08s; }
        .mb-3:nth-child(4), .form-group:nth-child(4) { animation-delay: 0.11s; }
        .mb-3:nth-child(5), .form-group:nth-child(5) { animation-delay: 0.14s; }
        .mb-3:nth-child(6), .form-group:nth-child(6) { animation-delay: 0.17s; }
        .mb-3:nth-child(7), .form-group:nth-child(7) { animation-delay: 0.2s; }
        .mb-3:nth-child(8), .form-group:nth-child(8) { animation-delay: 0.23s; }
        .mb-3:nth-child(9), .form-group:nth-child(9) { animation-delay: 0.26s; }
        .mb-3:nth-child(10), .form-group:nth-child(10) { animation-delay: 0.29s; }

        /* Navbar entrance */
        .top-navbar { animation: fadeInDown 0.3s ease; }

        /* Sidebar link entrance */
        #sidebar .nav-item { animation: slideInRight 0.3s ease both; }
        #sidebar .nav-item:nth-child(1) { animation-delay: 0.02s; }
        #sidebar .nav-item:nth-child(2) { animation-delay: 0.04s; }
        #sidebar .nav-item:nth-child(3) { animation-delay: 0.06s; }
        #sidebar .nav-item:nth-child(4) { animation-delay: 0.08s; }
        #sidebar .nav-item:nth-child(5) { animation-delay: 0.1s; }
        #sidebar .nav-item:nth-child(6) { animation-delay: 0.12s; }
        #sidebar .nav-item:nth-child(7) { animation-delay: 0.14s; }
        #sidebar .nav-item:nth-child(8) { animation-delay: 0.16s; }
        #sidebar .nav-item:nth-child(9) { animation-delay: 0.18s; }
        #sidebar .nav-item:nth-child(10) { animation-delay: 0.2s; }
        #sidebar .nav-item:nth-child(11) { animation-delay: 0.22s; }
        #sidebar .nav-item:nth-child(12) { animation-delay: 0.24s; }
        #sidebar .nav-item:nth-child(13) { animation-delay: 0.26s; }
        #sidebar .nav-item:nth-child(14) { animation-delay: 0.28s; }
        #sidebar .nav-item:nth-child(15) { animation-delay: 0.3s; }

        /* ===== STAT CARDS ===== */
        .stat-card {
            border-radius: var(--radius);
            padding: 22px 24px;
            color: white;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            border: none;
            cursor: default;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 5s ease-in-out infinite;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
            animation: float 7s ease-in-out infinite reverse;
        }
        .stat-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 16px 40px rgba(0,0,0,0.18);
        }
        .stat-card .stat-icon {
            font-size: 2rem;
            opacity: 0.3;
            position: absolute;
            top: 12px;
            right: 16px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .stat-card:hover .stat-icon {
            transform: scale(1.2) rotate(-10deg);
            opacity: 0.5;
        }
        .stat-card .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            position: relative;
            z-index: 1;
        }
        .stat-card .stat-label {
            font-size: 0.82rem;
            opacity: 0.85;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        .stat-card .stat-trend {
            position: absolute;
            bottom: 12px;
            right: 16px;
            font-size: 0.75rem;
            opacity: 0.7;
            animation: pulse 2s ease-in-out infinite;
        }

        /* ===== BUTTONS WITH RIPPLE ===== */
        .btn {
            border-radius: var(--radius-sm);
            font-weight: 600;
            padding: 10px 20px;
            font-size: 0.88rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease, background 0.25s ease;
        }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: var(--radius-xs); }
        .btn-lg { padding: 14px 28px; font-size: 1rem; border-radius: var(--radius-sm); }

        .btn-ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            box-shadow: 0 4px 15px rgba(108,92,231,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108,92,231,0.4);
            background: linear-gradient(135deg, var(--primary-dark), #4A3DB8);
        }
        .btn-primary:active {
            transform: translateY(0) scale(0.97);
        }
        .btn-success {
            background: linear-gradient(135deg, var(--success), #00A383);
            border: none;
            box-shadow: 0 4px 15px rgba(0,184,148,0.3);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,184,148,0.4);
        }
        .btn-success:active {
            transform: translateY(0) scale(0.97);
        }
        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #E05555);
            border: none;
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,107,107,0.4);
        }
        .btn-danger:active {
            transform: translateY(0) scale(0.97);
        }
        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #F0C050);
            border: none;
            color: #2d3436;
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(253,203,110,0.4);
        }
        .btn-warning:active {
            transform: translateY(0) scale(0.97);
        }
        .btn-info {
            background: linear-gradient(135deg, var(--info), #5BA3E8);
            border: none;
            color: white;
        }
        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(116,185,255,0.4);
        }
        .btn-info:active {
            transform: translateY(0) scale(0.97);
        }
        .btn-outline-primary {
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline-primary:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108,92,231,0.3);
        }
        .btn-outline-primary:active {
            transform: translateY(0) scale(0.97);
        }
        .btn-outline-secondary {
            border: 2px solid #dee2e6;
            color: #6c757d;
        }
        .btn-outline-secondary:hover {
            background: #f8f9fa;
            border-color: #adb5bd;
            transform: translateY(-2px);
        }
        .btn-outline-secondary:active {
            transform: translateY(0) scale(0.97);
        }
        .btn-outline-danger {
            border: 2px solid rgba(220,53,69,0.3);
            color: #dc3545;
        }
        .btn-outline-danger:hover {
            background: linear-gradient(135deg, var(--danger), #E05555);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220,53,69,0.3);
        }
        .btn-outline-danger:active {
            transform: translateY(0) scale(0.97);
        }
        .btn-outline-success {
            border: 2px solid rgba(0,184,148,0.3);
            color: var(--success);
        }
        .btn-outline-success:hover {
            background: linear-gradient(135deg, var(--success), #00A383);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }
        .btn-outline-success:active {
            transform: translateY(0) scale(0.97);
        }

        /* Card buttons hover effect */
        .card .btn {
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease, background 0.25s ease, color 0.25s ease;
        }

        /* ===== TABLE ===== */
        .table {
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: 0;
        }
        .table thead th {
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c757d;
            padding: 14px 12px;
        }
        .table tbody td { padding: 12px; vertical-align: middle; }
        .table tbody tr {
            transition: var(--transition);
        }
        .table tbody tr:hover {
            background: rgba(108,92,231,0.03) !important;
        }
        .table-hover tbody tr:hover {
            background: rgba(108,92,231,0.04);
        }

        /* ===== FORMS ===== */
        .form-control, .form-select {
            border-radius: var(--radius-sm);
            border: 1.5px solid #e9ecef;
            padding: 11px 14px;
            transition: var(--transition);
            font-size: 0.9rem;
            background: #fafbfc;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108,92,231,0.1);
            background: white;
        }
        .form-label { font-weight: 600; font-size: 0.85rem; color: #4a4a5a; margin-bottom: 6px; }
        .form-text { font-size: 0.78rem; color: #6c757d; }

        /* ===== CARDS ===== */
        .card {
            border-radius: var(--radius);
            border: 1px solid rgba(0,0,0,0.04);
            transition: var(--transition);
        }
        .card-header {
            background: white;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            padding: 18px 24px;
        }

        /* ===== BADGES ===== */
        .badge {
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
        }
        .badge.bg-info-subtle { background: rgba(116,185,255,0.15); color: #2980b9; }
        .badge.bg-warning-subtle { background: rgba(253,203,110,0.2); color: #b7950b; }
        .badge.bg-danger-subtle { background: rgba(255,107,107,0.15); color: #c0392b; }
        .badge.bg-success-subtle { background: rgba(0,184,148,0.15); color: #008060; }

        /* ===== ALERTS ===== */
        .alert {
            border-radius: var(--radius-sm);
            border: none;
            animation: slideInLeft 0.3s ease;
            padding: 14px 18px;
        }
        .alert-success { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: #155724; }
        .alert-danger { background: linear-gradient(135deg, #f8d7da, #f5c6cb); color: #721c24; }
        .alert-warning { background: linear-gradient(135deg, #fff3cd, #ffeaa7); color: #856404; }
        .alert-info { background: linear-gradient(135deg, #d1ecf1, #bee5eb); color: #0c5460; }

        /* ===== PAGINATION ===== */
        .pagination { gap: 4px; }
        .page-link {
            border-radius: var(--radius-xs) !important;
            border: none;
            padding: 8px 14px;
            font-weight: 500;
            color: var(--primary);
            transition: var(--transition);
        }
        .page-link:hover { background: var(--primary); color: white; }
        .page-item.active .page-link { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; }

        /* ===== NAV TABS ===== */
        .nav-tabs { border-bottom: 2px solid #e9ecef; gap: 4px; }
        .nav-tabs .nav-link {
            border: none;
            color: #6c757d;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            transition: var(--transition);
        }
        .nav-tabs .nav-link:hover { background: rgba(108,92,231,0.05); color: var(--primary); }
        .nav-tabs .nav-link.active {
            color: var(--primary);
            background: transparent;
            border-bottom: 3px solid var(--primary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 991.98px) {
            .stat-card .stat-number { font-size: 1.5rem; }
            .content-container { padding: 20px; }
        }
        @media (max-width: 767.98px) {
            #sidebar { position: fixed; top: 0; left: -260px; z-index: 1050; transition: left 0.3s; box-shadow: none; }
            #sidebar.open { left: 0; box-shadow: 4px 0 30px rgba(0,0,0,0.3); }
            #sidebarToggle { display: block; }
            .top-navbar { padding: 10px 15px; }
            .top-navbar h5 { font-size: 0.95rem; }
            .content-container { padding: 15px; }
            .main-card { padding: 16px; border-radius: 12px; }
            .stat-card { padding: 16px 18px; }
            .stat-card .stat-number { font-size: 1.3rem; }
            .table { font-size: 0.82rem; }
            .table thead th, .table tbody td { padding: 8px 6px; }
            .btn { padding: 8px 14px; font-size: 0.82rem; }
            .nav-tabs .nav-link { padding: 8px 12px; font-size: 0.82rem; }
        }

        /* ===== UTILITY ===== */
        .gradient-primary { background: linear-gradient(135deg, var(--primary), #8B74FF); }
        .gradient-secondary { background: linear-gradient(135deg, var(--secondary), #00E5D0); }
        .gradient-accent { background: linear-gradient(135deg, var(--accent), #E84393); }
        .gradient-warning { background: linear-gradient(135deg, #FDCB6E, #E17055); }
        .gradient-success { background: linear-gradient(135deg, var(--success), #55EFC4); }
        .gradient-info { background: linear-gradient(135deg, var(--info), #6C5CE7); }
        .gradient-danger { background: linear-gradient(135deg, var(--danger), #E05555); }
        .gradient-dark { background: linear-gradient(135deg, #2d3436, #636e72); }

        .text-gradient {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glass {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .glass-dark {
            background: rgba(26,26,46,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .empty-state { padding: 60px 20px; text-align: center; }
        .empty-state i { font-size: 4rem; color: #ddd; margin-bottom: 16px; }
        .empty-state h5 { color: #6c757d; font-weight: 600; }

        .clickable-row { cursor: pointer; }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        footer { margin-top: auto; }

        /* Scroll-triggered animations */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .animate-on-scroll.animate-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modal animation */
        .modal.fade .modal-dialog {
            transform: scale(0.9) translateY(-20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        .modal.show .modal-dialog {
            transform: scale(1) translateY(0);
        }

        /* Dropdown animation */
        .dropdown-menu {
            display: block;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }
        .dropdown-menu.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Toast notification animation */
        .toast {
            animation: slideInRight 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Progress bar animation */
        .progress-bar {
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Tooltip fade */
        .tooltip { animation: fadeIn 0.2s ease; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Page Transition -->
    <div id="page-transition">
        <div class="layer"></div>
        <div class="layer"></div>
        <div class="layer"></div>
    </div>
    <div id="page-loader"><div class="bar" id="loader-bar"></div></div>

    {% block body %}
    {% block content %}{% endblock %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ===== SIDEBAR TOGGLE =====
            const toggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (toggle && sidebar && overlay) {
                toggle.addEventListener('click', function() {
                    sidebar.classList.toggle('open');
                    overlay.classList.toggle('show');
                });
                overlay.addEventListener('click', function() {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('show');
                });
            }

            // ===== AUTO-HIDE ALERTS =====
            document.querySelectorAll('.alert-dismissible').forEach(function(alert) {
                setTimeout(function() {
                    var bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }, 5000);
            });

            // ===== CLICKABLE ROWS =====
            document.querySelectorAll('.clickable-row').forEach(function(row) {
                row.setAttribute('tabindex', '0');
                row.setAttribute('role', 'button');
                row.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        var href = this.dataset.href;
                        if (href) window.location = href;
                    }
                });
            });

            // ===== TOOLTIPS =====
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function(el) {
                return new bootstrap.Tooltip(el);
            });

            // ===== BUTTON RIPPLE EFFECT =====
            document.querySelectorAll('.btn:not(.btn-no-ripple)').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    var rect = btn.getBoundingClientRect();
                    var ripple = document.createElement('span');
                    ripple.className = 'btn-ripple';
                    var size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
                    ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
                    btn.appendChild(ripple);
                    setTimeout(function() { ripple.remove(); }, 600);
                });
            });

            // ===== PAGE TRANSITION (disabled for touch/reduced-motion) =====
            var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            var isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

            if (!prefersReduced && !isTouchDevice) {
                var transitionOverlay = document.getElementById('page-transition');
                var loaderBar = document.getElementById('loader-bar');
                var loader = document.getElementById('page-loader');
                var isTransitioning = false;

                function animatePageOut(callback) {
                    if (isTransitioning) return;
                    isTransitioning = true;
                    transitionOverlay.classList.add('active');
                    loader.classList.add('active');
                    loaderBar.style.width = '60%';
                    setTimeout(function() {
                        loaderBar.style.width = '90%';
                    }, 200);
                    setTimeout(function() {
                        transitionOverlay.classList.remove('active');
                        transitionOverlay.classList.add('exit');
                        loaderBar.style.width = '100%';
                        setTimeout(function() {
                            loader.classList.remove('active');
                            loaderBar.style.width = '0%';
                            transitionOverlay.classList.remove('exit');
                            isTransitioning = false;
                            if (callback) callback();
                        }, 500);
                    }, 300);
                }

                document.addEventListener('click', function(e) {
                    var link = e.target.closest('a');
                    if (!link) return;
                    var href = link.getAttribute('href');
                    if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:') || href.startsWith('tel:')) return;
                    if (link.hasAttribute('data-no-transition')) return;
                    if (link.getAttribute('target') === '_blank') return;
                    if (e.ctrlKey || e.metaKey || e.shiftKey) return;
                    var isInternal = href.indexOf('://') === -1 || href.indexOf(window.location.origin) === 0;
                    if (!isInternal) return;
                    if (link.hasAttribute('download')) return;
                    if (link.closest('form')) return;

                    e.preventDefault();
                    animatePageOut(function() {
                        window.location.href = href;
                    });
                });
            }

            // ===== SCROLL-TRIGGERED ANIMATIONS =====
            if ('IntersectionObserver' in window) {
                var observer = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('animate-visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                document.querySelectorAll('.animate-on-scroll').forEach(function(el) {
                    observer.observe(el);
                });
            }

            // ===== COUNTER ANIMATION FOR STAT NUMBERS =====
            document.querySelectorAll('.stat-number[data-count]').forEach(function(el) {
                var target = parseInt(el.getAttribute('data-count'));
                if (isNaN(target)) return;
                var duration = 1200;
                var startTime = null;
                var startVal = 0;

                function animateCount(timestamp) {
                    if (!startTime) startTime = timestamp;
                    var progress = Math.min((timestamp - startTime) / duration, 1);
                    var eased = 1 - Math.pow(1 - progress, 3);
                    var current = Math.floor(eased * target);
                    el.textContent = current.toLocaleString();
                    if (progress < 1) {
                        requestAnimationFrame(animateCount);
                    } else {
                        el.textContent = target.toLocaleString();
                    }
                }
                requestAnimationFrame(animateCount);
            });

            // ===== SMOOTH COLLAPSE FOR SIDEBAR =====
            document.querySelectorAll('#sidebar [data-bs-toggle="collapse"]').forEach(function(toggler) {
                var targetId = toggler.getAttribute('href') || toggler.getAttribute('data-bs-target');
                if (!targetId) return;
                var target = document.querySelector(targetId);
                if (!target) return;
                target.addEventListener('show.bs.collapse', function() {
                    target.style.overflow = 'hidden';
                });
                target.addEventListener('shown.bs.collapse', function() {
                    target.style.overflow = '';
                });
            });

            // ===== CARD HOVER TILT EFFECT (disabled on touch devices) =====
            if (!('ontouchstart' in window) && !navigator.maxTouchPoints) {
                document.querySelectorAll('.card-tilt').forEach(function(card) {
                    var ticking = false;
                    card.addEventListener('mousemove', function(e) {
                        if (!ticking) {
                            window.requestAnimationFrame(function() {
                                var rect = card.getBoundingClientRect();
                                if (!rect.width || !rect.height) return;
                                var x = e.clientX - rect.left;
                                var y = e.clientY - rect.top;
                                var centerX = rect.width / 2;
                                var centerY = rect.height / 2;
                                var rotateX = centerY ? (y - centerY) / centerY * -8 : 0;
                                var rotateY = centerX ? (x - centerX) / centerX * 8 : 0;
                                card.style.transform = 'perspective(1000px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) scale3d(1.02,1.02,1.02)';
                                ticking = false;
                            });
                            ticking = true;
                        }
                    });
                    card.addEventListener('mouseleave', function() {
                        card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1,1,1)';
                    });
                });
            }

            // ===== SHIMMER LOADING FOR IMAGES =====
            document.querySelectorAll('img').forEach(function(img) {
                if (!img.complete) {
                    img.style.opacity = '0';
                    img.addEventListener('load', function() {
                        img.style.transition = 'opacity 0.4s ease';
                        img.style.opacity = '1';
                    });
                }
            });

            console.log('%c UniManager v2.0 ', 'background:#6C5CE7;color:#fff;font-size:14px;padding:8px 12px;border-radius:6px;font-weight:bold;');
            console.log('%c Animations loaded ', 'background:#00CEC9;color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;');
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
