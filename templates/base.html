<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniManager | {% block title %}Boshqaruv Paneli{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-dark: #5A4BD1;
            --secondary: #00CEC9;
            --accent: #FD79A8;
            --bg: #f0f2f5;
            --sidebar-bg: #1a1a2e;
            --sidebar-hover: #16213e;
            --card-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        #sidebar { min-width: 260px; max-width: 260px; min-height: 100vh; background: var(--sidebar-bg); color: white; transition: all 0.3s; }
        #sidebar .logo-section { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 24px 20px; text-align: center; position: relative; overflow: hidden; }
        #sidebar .logo-section::after { content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%; background: rgba(255,255,255,0.05); border-radius: 50%; }
        #sidebar .logo-section h4 { position: relative; z-index: 1; letter-spacing: -0.5px; }
        #sidebar .nav-link { color: #a0a0b8; padding: 11px 20px; display: flex; align-items: center; transition: 0.25s; border-radius: 0 12px 12px 0; margin: 2px 10px 2px 0; font-weight: 500; font-size: 0.9rem; }
        #sidebar .nav-link:hover { background: var(--sidebar-hover); color: white; transform: translateX(4px); }
        #sidebar .nav-link.active { background: linear-gradient(135deg, var(--primary), #8B74FF); color: white !important; box-shadow: 0 4px 15px rgba(108,92,231,0.4); }
        #sidebar .nav-link i { font-size: 1.15rem; margin-right: 12px; width: 20px; text-align: center; }
        #sidebar .nav-link[data-bs-toggle="collapse"] .bi-chevron-down { transition: transform 0.3s; }
        #sidebar .nav-link[data-bs-toggle="collapse"]:not(.collapsed) .bi-chevron-down { transform: rotate(180deg); }
        #sidebar .collapse .nav-link { padding: 7px 15px; font-size: 0.85rem; }
        #sidebar .menu-label { font-size: 0.65rem; letter-spacing: 1.5px; color: #555; }
        .main-content { flex: 1; min-width: 0; }
        .top-navbar { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); padding: 12px 30px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .content-container { padding: 30px; }
        .main-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(255,255,255,0.8); box-shadow: var(--card-shadow); padding: 28px; }
        .user-profile-img { width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; box-shadow: 0 2px 8px rgba(108,92,231,0.3); }
        #sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1040; }
        #sidebar-overlay.show { display: block; }
        #sidebarToggle { display: none; cursor: pointer; }
        @media (max-width: 767.98px) { #sidebar { position: fixed; top: 0; left: -260px; z-index: 1050; transition: left 0.3s; } #sidebar.open { left: 0; } #sidebarToggle { display: block; } .top-navbar { padding: 10px 15px; } .content-container { padding: 15px; } .main-card { padding: 15px; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .main-card { animation: fadeInUp 0.4s ease; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; box-shadow: 0 4px 15px rgba(108,92,231,0.3); transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,92,231,0.4); }
        .btn-outline-danger { border: 1px solid rgba(220,53,69,0.3); color: #dc3545; transition: 0.3s; }
        .btn-outline-danger:hover { background: #dc3545; color: white; box-shadow: 0 4px 15px rgba(220,53,69,0.3); }
        .alert { border-radius: 12px; animation: fadeInUp 0.3s ease; }
        .table { border-radius: 12px; overflow: hidden; }
        .table thead th { background: #f8f9fa; border-bottom: 2px solid #e9ecef; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control, .form-select { border-radius: 10px; border: 1.5px solid #e9ecef; padding: 10px 14px; transition: 0.3s; }
        .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(108,92,231,0.1); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (toggle && sidebar && overlay) {
                toggle.addEventListener('click', function() { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); });
                overlay.addEventListener('click', function() { sidebar.classList.remove('open'); overlay.classList.remove('show'); });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
