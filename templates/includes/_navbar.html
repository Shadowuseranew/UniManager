<nav class="top-navbar d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
        <i class="bi bi-list fs-4 me-3 d-md-none" id="sidebarToggle" style="color:var(--primary);"></i>
        <h5 class="mb-0 fw-bold" style="color:#1a1a2e; letter-spacing:-0.3px;">
            Xush kelibsiz, {{ user.get_full_name|default:user.username }}! 👋
        </h5>
    </div>
    <div class="d-flex align-items-center">
        <div class="me-3 d-none d-md-block text-end">
            <div class="fw-semibold small" style="color:#1a1a2e;">{{ user.username }}</div>
            <div style="font-size: 0.7rem; color:var(--primary);">{{ user.get_role_display|default:user.role }}</div>
        </div>
        <div class="user-profile-img me-3" style="width:36px;height:36px;overflow:hidden;">
            {% if user.avatar %}
                <img src="{{ user.avatar.url }}" alt="" class="rounded-circle" style="width:36px;height:36px;object-fit:cover;">
            {% else %}
                {{ user.username|first|upper }}
            {% endif %}
        </div>
        <form action="{% url 'logout' %}" method="post" class="m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                <i class="bi bi-box-arrow-right me-1"></i> Chiqish
            </button>
        </form>
    </div>
</nav>
