{% extends 'base.html' %}
{% block title %}Tizimga kirish{% endblock %}
{% block content %}
<style>
    .login-wrapper {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.5s ease;
    }
    .login-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(108,92,231,0.15);
        overflow: hidden;
        width: 100%;
        max-width: 420px;
        animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .login-header {
        background: linear-gradient(135deg, #6C5CE7, #00CEC9);
        padding: 40px 30px 30px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    .login-header::before {
        content: '';
        position: absolute;
        top: -60%;
        right: -30%;
        width: 200px;
        height: 200px;
        background: rgba(255,255,255,0.06);
        border-radius: 50%;
        animation: float 6s ease-in-out infinite;
    }
    .login-header::after {
        content: '';
        position: absolute;
        bottom: -30%;
        left: -20%;
        width: 120px;
        height: 120px;
        background: rgba(255,255,255,0.04);
        border-radius: 50%;
        animation: float 8s ease-in-out infinite reverse;
    }
    .login-header .icon {
        width: 64px;
        height: 64px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
        font-size: 1.8rem;
        color: white;
        position: relative;
        z-index: 1;
        animation: pulse 2s ease-in-out infinite;
    }
    .login-header h3 {
        color: white;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin: 0;
        position: relative;
        z-index: 1;
    }
    .login-header p {
        color: rgba(255,255,255,0.8);
        font-size: 0.85rem;
        margin: 5px 0 0;
        position: relative;
        z-index: 1;
    }
    .login-body {
        padding: 30px;
    }
    .login-body .form-label {
        font-weight: 600;
        font-size: 0.85rem;
        color: #1a1a2e;
    }
    .login-body .form-control {
        border: 1.5px solid #e9ecef;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 0.95rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .login-body .form-control:focus {
        border-color: #6C5CE7;
        box-shadow: 0 0 0 4px rgba(108,92,231,0.1);
        transform: translateY(-1px);
    }
    .login-body .btn-login {
        background: linear-gradient(135deg, #6C5CE7, #5A4BD1);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        font-size: 1rem;
        position: relative;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(108,92,231,0.3);
    }
    .login-body .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(108,92,231,0.4);
    }
    .login-body .btn-login:active {
        transform: translateY(0) scale(0.97);
    }
    @keyframes inputFocus {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    /* Floating particles background */
    .login-particles {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }
    .login-particles span {
        position: absolute;
        display: block;
        width: 20px; height: 20px;
        background: rgba(108,92,231,0.08);
        border-radius: 50%;
        animation: floatParticle 15s infinite;
    }
    .login-particles span:nth-child(1) { left: 10%; top: 20%; width: 30px; height: 30px; animation-delay: 0s; animation-duration: 18s; }
    .login-particles span:nth-child(2) { left: 20%; top: 60%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 14s; }
    .login-particles span:nth-child(3) { left: 40%; top: 10%; width: 25px; height: 25px; animation-delay: 4s; animation-duration: 20s; }
    .login-particles span:nth-child(4) { left: 55%; top: 70%; width: 18px; height: 18px; animation-delay: 1s; animation-duration: 16s; }
    .login-particles span:nth-child(5) { left: 70%; top: 30%; width: 22px; height: 22px; animation-delay: 3s; animation-duration: 17s; }
    .login-particles span:nth-child(6) { left: 85%; top: 50%; width: 12px; height: 12px; animation-delay: 5s; animation-duration: 13s; }
    .login-particles span:nth-child(7) { left: 90%; top: 80%; width: 28px; height: 28px; animation-delay: 2.5s; animation-duration: 19s; }
    .login-particles span:nth-child(8) { left: 35%; top: 85%; width: 16px; height: 16px; animation-delay: 4.5s; animation-duration: 15s; }
    @keyframes floatParticle {
        0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
        25% { transform: translateY(-30px) rotate(90deg); opacity: 0.6; }
        50% { transform: translateY(-60px) rotate(180deg); opacity: 0.3; }
        75% { transform: translateY(-30px) rotate(270deg); opacity: 0.6; }
    }
    .login-wrapper { position: relative; z-index: 1; }
    .login-body .form-control:focus ~ .input-highlight {
        animation: inputFocus 2s ease infinite;
    }
</style>

<div class="login-particles">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="icon">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h3>UniManager</h3>
            <p>University Management tizimiga xush kelibsiz</p>
        </div>
        <div class="login-body">
            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-danger py-2 text-center" role="alert" style="border-radius:12px;font-size:0.85rem;">
                        <i class="bi bi-exclamation-triangle me-1"></i> Foydalanuvchi nomi yoki parol noto'g'ri!
                    </div>
                {% endif %}

                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">Foydalanuvchi nomi</label>
                    <input type="text" name="username" class="form-control" placeholder="Username ni kiriting" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Parol</label>
                    <input type="password" name="password" class="form-control" placeholder="Parolni kiriting" required>
                </div>
                <button type="submit" class="btn-login w-100 btn-no-ripple">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Kirish
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
