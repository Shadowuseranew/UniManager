{% extends 'base.html' %}
{% block title %}Tizimga kirish{% endblock %}
{% block content %}
<style>
    .login-wrapper {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(108,92,231,0.15);
        overflow: hidden;
        width: 100%;
        max-width: 420px;
    }
    .login-header {
        background: linear-gradient(135deg, #6C5CE7, #00CEC9);
        padding: 40px 30px 30px;
        text-align: center;
        position: relative;
    }
    .login-header .icon {
        width: 64px;
        height: 64px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
        font-size: 1.8rem;
        color: white;
    }
    .login-header h3 {
        color: white;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin: 0;
    }
    .login-header p {
        color: rgba(255,255,255,0.8);
        font-size: 0.85rem;
        margin: 5px 0 0;
    }
    .login-body {
        padding: 30px;
    }
    .login-body .form-label {
        font-weight: 600;
        font-size: 0.85rem;
        color: #1a1a2e;
    }
    .login-body .form-control {
        border: 1.5px solid #e9ecef;
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 0.95rem;
        transition: 0.3s;
    }
    .login-body .form-control:focus {
        border-color: #6C5CE7;
        box-shadow: 0 0 0 4px rgba(108,92,231,0.1);
    }
    .login-body .btn-login {
        background: linear-gradient(135deg, #6C5CE7, #5A4BD1);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        font-size: 1rem;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(108,92,231,0.3);
    }
    .login-body .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(108,92,231,0.4);
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="icon">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h3>UniManager</h3>
            <p>University Management tizimiga xush kelibsiz</p>
        </div>
        <div class="login-body">
            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-danger py-2 text-center" role="alert" style="border-radius:12px;font-size:0.85rem;">
                        <i class="bi bi-exclamation-triangle me-1"></i> Foydalanuvchi nomi yoki parol noto'g'ri!
                    </div>
                {% endif %}

                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}

                <div class="mb-3">
                    <label class="form-label">Foydalanuvchi nomi</label>
                    <input type="text" name="username" class="form-control" placeholder="Username ni kiriting" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Parol</label>
                    <input type="password" name="password" class="form-control" placeholder="Parolni kiriting" required>
                </div>
                <button type="submit" class="btn-login w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Kirish
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
