{% extends 'dashboard_base.html' %}

{% block sidebar_menu %}
<p class="menu-label text-uppercase fw-bold mb-2 ps-3 mt-3">Asosiy</p>
<ul class="nav flex-column">
    <li class="nav-item">
        <a href="{% url 'dashboard' %}" class="nav-link mb-1 {% if request.path == '/' %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
    </li>
    <li class="nav-item">
        <a href="{% url 'subject_list' %}" class="nav-link mb-1 {% if 'subject' in request.path %}active{% endif %}">
            <i class="bi bi-book"></i> Fanlar
        </a>
    </li>
    <li class="nav-item">
        <a href="{% url 'timetable_view' %}" class="nav-link mb-1 {% if 'timetable' in request.path %}active{% endif %}">

        <a href="{% url 'exam_list' %}" class="nav-link mb-1 {% if 'exam' in request.path %}active{% endif %}">

        </a>

    <li class="nav-item">
        <a href="{% url 'material_list' %}" class="nav-link mb-1 {% if 'material' in request.path %}active{% endif %}">
            <i class="bi bi-folder"></i> Materiallar
        </a>
    </li>

        <a href="{% url 'chat_assistant' %}" class="nav-link mb-1 {% if 'chat' in request.path %}active{% endif %}">
            <i class="bi bi-robot"></i> AI Yordamchi
        </a>
    </li>
</ul>

<p class="menu-label text-uppercase fw-bold mb-2 ps-3 mt-4">Rolga Mos</p>
<ul class="nav flex-column">
    <li class="nav-item">
        <a href="{% url 'student_dashboard' %}" class="nav-link mb-1 {% if 'student_dashboard' in request.path %}active{% endif %}">
            <i class="bi bi-graph-up-arrow"></i> Mening Natijalarim
        </a>
    </li>
</ul>
