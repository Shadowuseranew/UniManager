{% extends base_template %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="main-card text-center p-5" style="border-left: 4px solid var(--danger);">
            <div style="width:72px;height:72px;background:rgba(255,107,107,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2rem;"></i>
            </div>
            <h4 class="fw-bold mb-2" style="color:#2d3436;">Foydalanuvchini o'chirish</h4>
            <p class="text-muted mb-1">Siz quyidagi foydalanuvchini o'chirmoqchisiz:</p>
            <p class="fw-bold fs-5 mb-4" style="color:var(--primary);">{{ user_obj.get_full_name|default:user_obj.username }}</p>
            <p class="text-danger small mb-4"><i class="bi bi-info-circle me-1"></i> Bu amalni qaytarib bo'lmaydi!</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger px-4 py-2">
                        <i class="bi bi-trash3 me-1"></i> Ha, o'chirilsin
                    </button>
                    <a href="{% url 'user_list' %}" class="btn btn-outline-secondary px-4 py-2">
                        <i class="bi bi-x-lg me-1"></i> Bekor qilish
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
